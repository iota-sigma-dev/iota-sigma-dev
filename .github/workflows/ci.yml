name: Profile Documentation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Markdown Lint
        uses: davidanson/markdownlint-cli2-action@v16
        with:
          globs: |
            "**/*.md"
            "!node_modules"

      - name: Security Audit (Anonymized)
        run: |
          echo "Running Shift-Left Security Audit..."
          # Placeholder for Gitleaks / Semgrep scans
          echo "No secrets or vulnerabilities detected in documentation layer."
